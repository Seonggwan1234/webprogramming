<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | My Favorite Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">My Favorite Archive</div>
      <h1 class="auth-title">회원가입</h1>
      <form id="signupForm">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="s-name" placeholder="이름을 입력해 주세요" required>
        </div>
        <div class="form-group">
          <label>아이디</label>
          <input type="text" id="s-username" placeholder="영문·숫자 조합" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="s-password" placeholder="비밀번호를 입력해 주세요" required autocomplete="new-password">
        </div>
        <p class="auth-error" id="signupError"></p>
        <button type="submit" class="btn-save auth-submit">가입하기</button>
      </form>
      <div class="auth-footer">
        이미 계정이 있으신가요? <a href="login.html">로그인</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="signup.js"></script>
</body>
</html>
